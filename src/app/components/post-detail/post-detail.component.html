<mat-card class="post-card">
  <mat-card-header>
    <div mat-card-avatar><mat-icon>account_circle</mat-icon></div>
    <mat-card-title>Jouda Sphp</mat-card-title>
    <mat-card-subtitle>{{ item.id }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>{{ item.content }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-icon-button><mat-icon>favorite</mat-icon></button>
    <button mat-icon-button><mat-icon>share</mat-icon></button>
  </mat-card-actions>
</mat-card>
