@if (!showForm){
<button mat-button color="primary" type="button" (click)="showForm = true">
  Přidat post
</button>
} @if (!showForm){
<!-- p-6 shadow-lg w-full max-w-md -->
<section class="grid grid-cols-1 gap-4">
  <form [formGroup]="formular" (ngSubmit)="onSubmit()">
    <div>
      <mat-form-field appearance="fill" class="w-full">
        <input class="" placeholder="Co se Vám honí hlavou…" matInput formControlName="content" id="content" />
      </mat-form-field>
    </div>
    <div class="flex justify-end space-x-2">
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="formular.invalid"
      >
        Odeslat
      </button>

      <button
        mat-button
        color="accent"
        type="button"
        class=""
        (click)="closeForm()"
      >
        Zrušit
      </button>
    </div>
  </form>
</section>
} @if(posts$ | async; as posts) {
  @for(post of posts; track post) {
<section class="mb-3">
  <app-post-detail [item]="post"></app-post-detail>
</section>
} @empty { Žádná data :-( } }
